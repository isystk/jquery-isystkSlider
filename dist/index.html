<!DOCTYPE HTML>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="robots" content="noindex, nofollow">
  <title>画像スライダー | DEMOページ</title>
<link href="css/common.css" rel="stylesheet"></head>
<body class="column2 side-left">
  <div class="wrap">
    <header>
      <div class="header-image">
        <div class="logo">画像スライダー</div>
      </div>
    </header>
    <div class="content">
      <main>
        <article class="detail" >
          <div class="entry-header">
            <h1 class="entry-title"><a href="#">画像スライダーのサンプル</a></h1>
          </div>
          <div class="entry-content">
            <h2>デモ</h2>

            <h3>１ページ５枚：カルーセルなし</h3>
            <div class="js-slider isystkSlider" data-shift="5" data-carousel="false">
              <div class="view-layer">
                <ul class="parent">
                  <li class="child">
                    <p>
                      <img src="../images/photo1.jpg" width="100px">
                    </p>
                  </li>
                  <li class="child">
                    <p>
                      <img src="../images/photo2.jpg" width="100px">
                    </p>
                  </li>
                  <li class="child">
                    <p>
                      <img src="../images/photo3.jpg" width="100px">
                    </p>
                  </li>
                  <li class="child">
                    <p>
                      <img src="../images/photo4.jpg" width="100px">
                    </p>
                  </li>
                  <li class="child">
                    <p>
                      <img src="../images/photo5.jpg" width="100px">
                    </p>
                  </li>
                  <li class="child">
                    <p>
                      <img src="../images/photo6.jpg" width="100px">
                    </p>
                  </li>
                  <li class="child">
                    <p>
                      <img src="../images/photo7.jpg" width="100px">
                    </p>
                  </li>
                  <li class="child">
                    <p>
                      <img src="../images/photo8.jpg" width="100px">
                    </p>
                  </li>
                  <li class="child">
                    <p>
                      <img src="../images/photo9.jpg" width="100px">
                    </p>
                  </li>
                  <li class="child">
                    <p>
                      <img src="../images/photo10.jpg" width="100px">
                    </p>
                  </li>
                  <li class="child">
                    <p>
                      <img src="../images/photo11.jpg" width="100px">
                    </p>
                  </li>
                  <li class="child">
                    <p>
                      <img src="../images/photo12.jpg" width="100px">
                    </p>
                  </li>
                </ul>
            </div>
              <p class="button next next-btn"><a href="#"><img src="../images/btn-next.png" alt="次へ" ></a></p>
              <p class="button back prev-btn"><a href="#"><img src="../images/btn-prev.png" alt="前へ" ></a></p>
              <ul class="slide_dot">
                <li class="active" data-pageno="1"></li>
                <li data-pageno="2"></li>
                <li data-pageno="3"></li>
              </ul>
            </div>

            <h3>１ページ５枚：カルーセルあり、自動スクロール</h3>
            <div class="js-slider isystkSlider" data-shift="5" data-carousel="true" data-auto-slide="true">
              <div class="view-layer">
                <ul class="parent">
                  <li class="child">
                    <p>
                      <img src="../images/photo1.jpg" width="100px">
                    </p>
                  </li>
                  <li class="child">
                    <p>
                      <img src="../images/photo2.jpg" width="100px">
                    </p>
                  </li>
                  <li class="child">
                    <p>
                      <img src="../images/photo3.jpg" width="100px">
                    </p>
                  </li>
                  <li class="child">
                    <p>
                      <img src="../images/photo4.jpg" width="100px">
                    </p>
                  </li>
                  <li class="child">
                    <p>
                      <img src="../images/photo5.jpg" width="100px">
                    </p>
                  </li>
                  <li class="child">

                    </p>
                  </li>
                  <li class="child">
                    <p>
                      <img src="../images/photo10.jpg" width="100px">
                    </p>
                  </li>
                </ul>
            </div>
              <p class="button next next-btn"><a href="#"><img src="../images/btn-next.png" alt="次へ" ></a></p>
              <p class="button back prev-btn"><a href="#"><img src="../images/btn-prev.png" alt="前へ" ></a></p>
              <ul class="slide_dot">
                <li class="active" data-pageno="1"></li>
                <li data-pageno="2"></li>
              </ul>
            </div>

          </div>
        </article>
      </main>
      <aside class="side-left">
        <div id="sticky-navigator">
        </div>
      </aside>
    </div>
  </div>
<script type="text/javascript" src="js/index.js"></script></body>
</html>
